{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Daily</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        :root {
            --ink: #0f0e0c;
            --cream: #f5f0e8;
            --amber: #d97706;
            --amber-light: #fbbf24;
            --muted: #6b6560;
            --border: #e2ddd6;
            --white: #ffffff;
            --card-bg: #ffffff;
            --surface: #faf8f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.7;
        }

        /* ── HEADER ── */
        .main-header {
            background: var(--ink);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--amber);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0;
            min-height: 72px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--white) !important;
            text-decoration: none !important;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--amber);
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 2px;
        }

        .nav-cats {
            display: flex;
            align-items: center;
            gap: 0;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-cats li a {
            color: #a89f96 !important;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 24px 14px;
            display: block;
            transition: color 0.2s, background 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
        }

        .nav-cats li a:hover {
            color: var(--amber-light) !important;
            border-bottom-color: var(--amber);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-auth-login {
            background: var(--amber);
            color: var(--ink) !important;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.4px;
            transition: background 0.2s;
            border: none;
        }

        .btn-auth-login:hover {
            background: var(--amber-light);
            text-decoration: none;
        }

        .btn-auth-register {
            background: transparent;
            color: #a89f96 !important;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.4px;
            border: 1px solid #3a3733;
            transition: all 0.2s;
        }

        .btn-auth-register:hover {
            border-color: var(--amber);
            color: var(--amber-light) !important;
        }

        .btn-auth-logout {
            background: transparent;
            color: #e74c3c !important;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 4px;
            text-decoration: none;
            letter-spacing: 0.4px;
            border: 1px solid #e74c3c44;
            transition: all 0.2s;
        }

        .btn-auth-logout:hover {
            background: #e74c3c18;
        }

        .btn-dashboard {
            color: var(--amber-light) !important;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: 0.4px;
            transition: color 0.2s;
        }

        .btn-dashboard:hover {
            color: var(--white) !important;
        }

        /* Search */
        .search-form {
            display: flex;
            align-items: center;
        }

        .search-input {
            background: #1e1c19;
            border: 1px solid #3a3733;
            border-right: none;
            color: var(--white);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            padding: 8px 14px;
            border-radius: 4px 0 0 4px;
            width: 170px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: #6b6560; }
        .search-input:focus { border-color: var(--amber); }

        .search-btn {
            background: var(--amber);
            border: none;
            color: var(--ink);
            padding: 8px 14px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
        }

        .search-btn:hover { background: var(--amber-light); }

        /* ── LAYOUT ── */
        .page-wrapper {
            min-height: calc(100vh - 72px - 80px);
        }

        /* ── SECTION TITLES ── */
        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--amber);
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── CARDS ── */
        .blog-card {
            background: var(--card-bg);
            border: none;
            border-radius: 0;
            border-left: 3px solid transparent;
            padding: 28px 28px 28px 24px;
            margin-bottom: 2px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .blog-card:hover {
            border-left-color: var(--amber);
            box-shadow: 4px 0 20px rgba(0,0,0,0.06);
        }

        .blog-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 10px;
            color: var(--ink);
        }

        .blog-card-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .blog-card-title a:hover { color: var(--amber); }

        .blog-meta {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .blog-excerpt {
            font-size: 15px;
            color: #4a453f;
            line-height: 1.75;
        }

        /* ── SIDEBAR ── */
        .sidebar-widget {
            background: var(--card-bg);
            padding: 28px;
            margin-bottom: 24px;
            border-top: 3px solid var(--amber);
        }

        .sidebar-widget h4 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--ink);
        }

        .sidebar-widget ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-widget ul li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .sidebar-widget ul li:last-child { border-bottom: none; }

        .sidebar-widget ul li a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 400;
        }

        .sidebar-widget ul li a:hover { color: var(--amber); }

        .sidebar-widget p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--ink);
            color: #6b6560;
            text-align: center;
            padding: 32px 0;
            margin-top: 80px;
            border-top: 3px solid var(--amber);
        }

        footer p {
            font-size: 13px;
            margin: 0;
            letter-spacing: 0.3px;
        }

        footer strong { color: var(--amber); }

        /* ── RESPONSIVE ── */
        @media (max-width: 991px) {
            .nav-cats { display: none; }
            .header-inner { flex-wrap: wrap; padding: 14px 0; gap: 12px; }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-inner">

                <a class="logo" href="/">
                    <span class="logo-dot"></span>
                    Bharat Daily
                </a>

                <ul class="nav-cats d-none d-lg-flex">
                    {% for cat in categories %}
                    <li>
                        <a href="{% url 'posts_by_category' cat.id %}">{{ cat.category_name }}</a>
                    </li>
                    {% endfor %}
                </ul>

                <div class="nav-actions">
                    {% if user.is_authenticated %}
                        <a class="btn-dashboard" href="{% url 'dashboard' %}">Dashboard</a>
                        <a class="btn-auth-logout" href="{% url 'logout' %}">Logout</a>
                    {% else %}
                        <a class="btn-auth-login" href="{% url 'login' %}">Login</a>
                        <a class="btn-auth-register" href="{% url 'register' %}">Register</a>
                    {% endif %}

                    <form action="{% url 'search' %}" method="get" class="search-form ml-2">
                        <input type="search" class="search-input" placeholder="Search…" name="keyword">
                        <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
                    </form>
                </div>

            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="page-wrapper">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>Bharat Daily By <strong>Nikhil Verma</strong></p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
