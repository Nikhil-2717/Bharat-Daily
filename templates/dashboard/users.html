{% extends 'base.html' %}


{% block content %}

<div class="row">
    <!-- Left sidebar -->
    <!-- load the sidebar here -->
    {% include 'dashboard/sidebar.html' %}

    <!-- Right side content -->
    <div class="col-md-9">
         
         <h2>All Users</h2>
         <a href="{%url 'add_user' %}" class="btn btn-dark text-light float-right mb-2">Add New</a>
        <table class="table">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Full Name</th>
                    <th scope="col">Username</th>
                    <th scope="col">Email</th>
                    <th scope="col">Status</th>
                    <th scope="col">Published</th>
                    <th scope="col">Action</th>
                </tr>
            </thead>
            <tbody>
                {%for user in users%}
                <tr>
                    <th scope="row">{{ forloop.counter}}</th>
                    <td>{{user.first_name}} {{user.last_name}}</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                        <a href="{%url 'edit_user' user.id%}"><i class="fa fa-edit text-success"></i></a>
                        &nbsp;
                        <a href="{%url 'delete_user' user.id%}"><i class="fa fa-trash text-danger"></i></a>
                    </td>
                </tr>
                {%endfor%}
                
                </tr>
            </tbody>
        </table>
        

    </div>
</div>

{% endblock %}
