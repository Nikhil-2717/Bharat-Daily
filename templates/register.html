{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<style>
    .auth-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
    }

    .auth-card {
        width: 100%;
        max-width: 520px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .auth-eyebrow {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 12px;
    }

    .auth-title {
        font-family: 'Playfair Display', serif;
        font-size: 42px;
        font-weight: 900;
        color: var(--ink);
        letter-spacing: -1px;
        margin: 0;
    }

    .auth-body {
        background: var(--white);
        padding: 44px 44px 36px;
        border-top: 3px solid var(--amber);
    }

    .auth-body .form-control {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        padding: 12px 16px;
        color: var(--ink);
        height: auto;
        transition: border-color 0.2s;
    }

    .auth-body .form-control:focus {
        border-color: var(--amber);
        box-shadow: none;
        background: var(--white);
    }

    .auth-body label {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
    }

    .auth-body .form-group { margin-bottom: 22px; }

    .auth-submit {
        display: block;
        width: 100%;
        background: var(--ink);
        color: var(--cream);
        border: none;
        padding: 14px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
    }

    .auth-submit:hover {
        background: var(--amber);
        color: var(--ink);
    }

    .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--muted);
    }

    .auth-footer a {
        color: var(--amber);
        font-weight: 500;
        text-decoration: none;
    }

    .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <p class="auth-eyebrow">Join Us</p>
            <h1 class="auth-title">Create Account</h1>
        </div>
        <div class="auth-body">
            <form action="{% url 'register' %}" method="POST">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="auth-submit">Create Account &rarr;</button>
            </form>
        </div>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</div>

{% endblock %}
